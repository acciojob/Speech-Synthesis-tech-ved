<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speech Synthesis</title>
  <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="voiceinator">

      <h1>The Voiceinator 5000</h1>

      <select name="voice" id="voices">
        <option value="">Select A Voice</option>
      </select>

      <label for="rate">Rate:</label>
      <input name="rate" type="range" min="0" max="3" value="1" step="0.1">

      <label for="pitch">Pitch:</label>

      <input name="pitch" type="range" min="0" max="2" step="0.1">
      <textarea name="text">Hello! I love JavaScript 👍</textarea>
      <button id="stop">Stop!</button>
      <button id="speak">Speak</button>

    </div>

<script>
  const msg = new SpeechSynthesisUtterance();
  let voices = [];
  const voicesDropdown = document.querySelector('[name="voice"]');
  const options = document.querySelectorAll('[type="range"], [name="text"]');
  const speakButton = document.querySelector('#speak');
  const stopButton = document.querySelector('#stop');

  //Your code goes here
	<script>
const synth = window.speechSynthesis;

const textInput = document.querySelector("textarea");
const voiceSelect = document.querySelector("select");
const speakBtn = document.getElementById("speak");
const stopBtn = document.getElementById("stop");
const rateSlider = document.getElementById("rate");
const pitchSlider = document.getElementById("pitch");

let voices = [];
let utterance = null;

// populate voices
function loadVoices() {
  voices = synth.getVoices();
  voiceSelect.innerHTML = "";

  if (voices.length === 0) {
    const opt = document.createElement("option");
    opt.textContent = "No voices available";
    voiceSelect.appendChild(opt);
    return;
  }

  voices.forEach((v, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = v.name;
    voiceSelect.appendChild(option);
  });
}

// speak
function speakText() {
  const text = textInput.value.trim();
  if (!text) return;

  synth.cancel(); // restart if speaking

  utterance = new SpeechSynthesisUtterance(text);

  const selectedVoice = voices[voiceSelect.value];
  if (selectedVoice) utterance.voice = selectedVoice;

  utterance.rate = parseFloat(rateSlider.value);
  utterance.pitch = parseFloat(pitchSlider.value);

  synth.speak(utterance);
}

// stop
function stopSpeech() {
  synth.cancel();
}

// events
speakBtn.addEventListener("click", speakText);
stopBtn.addEventListener("click", stopSpeech);
voiceSelect.addEventListener("change", speakText);
rateSlider.addEventListener("input", () => {
  if (utterance) utterance.rate = parseFloat(rateSlider.value);
});
pitchSlider.addEventListener("input", () => {
  if (utterance) utterance.pitch = parseFloat(pitchSlider.value);
});

// voices load (async browser)
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = loadVoices;
}
	
</script>


</body>
</html>
